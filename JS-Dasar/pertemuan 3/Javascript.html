<!DOCTYPE html>
<html>

<head>
    <title>Form Kelulusan Siswa</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }

        input {
            width: 200px;
            padding: 5px;
            margin-bottom: 10px;
            border-radius: 10px;
        }

        button {
            padding: 8px 15px;
            font-size: 16px;
        }

        #hasil {
            margin-top: 20px;
            font-weight: bold;
            font-size: 18px;
        }

        h2 {
            background-color: black;
        }
    </style>
</head>

<body>

    <h2>Form Kelulusan Siswa</h2>

    <form onsubmit="cekKelulusan(event)">
        <label>Nama:</label><br>
        <input type="text" id="nama" required><br>

        <label>Nilai Teori:</label><br>
        <input type="number" id="nilaiTeori" required><br>

        <label>Nilai Praktek:</label><br>
        <input type="number" id="nilaiPraktek" required><br>

        <label>Nilai Ujian:</label><br>
        <input type="number" id="nilaiUjian" required><br>

        <label>Kehadiran (%):</label><br>
        <input type="number" id="kehadiran" required><br><br>

        <button type="submit">Cek Kelulusan</button>
    </form>

    <h3>Hasil:</h3>
    <p id="hasil"></p>

    <script>
        function cekKelulusan(event) {
            event.preventDefault(); // mencegah form submit ke server

            let nama = document.getElementById("nama").value;
            let nilaiTeori = Number(document.getElementById("nilaiTeori").value);
            let nilaiPraktek = Number(document.getElementById("nilaiPraktek").value);
            let nilaiUjian = Number(document.getElementById("nilaiUjian").value);
            let kehadiran = Number(document.getElementById("kehadiran").value);

            let rataRata = (nilaiTeori + nilaiPraktek + nilaiUjian) / 3;

            let status = "";
            let warna = "";

            if (rataRata >= 75 && nilaiTeori >= 75 && nilaiPraktek >= 75 && nilaiUjian >= 75 && kehadiran >= 90) {
                if (rataRata > 90) {
                    status = "Lulus - Sangat Baik";
                } else {
                    status = "Lulus";
                }
                warna = "green";
            } else {
                status = "Tidak Lulus";
                warna = "red";
            }

            document.getElementById("hasil").innerHTML =
                "Nama: " + nama + "<br>" +
                "Rata-rata: " + rataRata.toFixed(2) + "<br>" +
                "Status: " + status;
            document.getElementById("hasil").style.color = warna;
        }
    </script>

</body>

</html>
