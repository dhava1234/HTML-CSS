<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array Gabungan</title>
</head>

<body>
    <div class="mb-3">
        <label for="">Nama</label>
        <input type="text" id="input-nama" placeholder="Masukan Nama..">
    </div>
    <button id="btn-tambah">Tambah Data</button>

    <table border="1" width="100%">
        <thead>
            <tr>
                <th>Nama</th>
                <th>Jenis Kelamin</th>
                <th>Umur</th>
                <th>Alamat</th>
                <th>Aksi</th>
            </tr>
        </thead>

        <tbody id="table-siswa"></tbody>
    </table>

    <script>
        // Array contoh
        let daftarBuah = ["Apel", "Nanas", "Jeruk", "Semangka"];
        let daftarHarga = [1000, 2000, 3000];
        let mixHargaBuah = ["Nanas", 1000, "Semangka", 20000];
        let peserta = [
            ["Dhava", "10", "Jakarta", "Pria"],
            ["Budi", "13", "Jakarta", "Pria"],
            ["Reza", "10", "Jakarta", "Pria"]
        ];

        console.log("Daftar Buah:", daftarBuah);
        console.log("Daftar Harga:", daftarHarga);
        console.log("Mix Harga Buah:", mixHargaBuah);
        console.log("Peserta:", peserta);

        let daftarSiswa = [
            { nama: "Dhava Agsella", umur: "10", alamat: "Jakarta", jenisKelamin: "Pria" },
            { nama: "Budi Sudarsono", umur: "13", alamat: "Jakarta", jenisKelamin: "Pria" },
            { nama: "Reza", umur: "10", alamat: "Jakarta", jenisKelamin: "Pria" }
        ];

        const tbodySiswa = document.getElementById('table-siswa');
        const btnTambah = document.getElementById('btn-tambah');
        const inputNama = document.getElementById('input-nama');

        // Fungsi tampilkan data siswa ke tabel
        function getDataSiswa() {
            tbodySiswa.innerHTML = "";
            daftarSiswa.forEach((siswa, index) => {
                let barisBaru = document.createElement('tr');
                barisBaru.innerHTML = `
                    <td>${siswa.nama}</td>
                    <td>${siswa.jenisKelamin}</td>
                    <td>${siswa.umur}</td>
                    <td>${siswa.alamat}</td>
                    <td><button class='btn-hapus' data-index="${index}">Hapus</button></td>
                `;
                tbodySiswa.appendChild(barisBaru);
            });
        }

        // Tampilkan data awal
        getDataSiswa();

        // Tambah data
        btnTambah.addEventListener('click', () => {
            if (inputNama.value.trim() === "") {
                alert("Nama tidak boleh kosong!");
                return;
            }
            daftarSiswa.push({
                nama: inputNama.value.trim(),
                jenisKelamin: "",
                umur: "",
                alamat: ""
            });
            getDataSiswa();
            inputNama.value = "";
        });

        // Hapus data
        tbodySiswa.addEventListener('click', (event) => {
            if (event.target.classList.contains('btn-hapus')) {
                let indexData = event.target.getAttribute('data-index');
                daftarSiswa.splice(indexData, 1);
                getDataSiswa();
            }
        });
    </script>
</body>

</html>
