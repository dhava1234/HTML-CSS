<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Form Kontak</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
        }

        .container {
            width: 500px;
            margin: 45px auto;
            background: #fff;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.1);
        }

        input {
            width: 100%;
            padding: 8px 8px;
            margin: 8px 0;
            box-sizing: border-box;
            transition: border-color 0, 3s;
        }

        button {
            padding: 8px 12px;
            margin-top: 10px;
            cursor: pointer;
        }

        .btn-simpan {
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .btn-simpan:hover {
            background-color: aqua;
        }

        .btn-batal:hover {
            background-color: aqua;
        }

        .btn-batal {
            background-color: #f44336;
            color: white;
            border: none;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h3>Pendaftaran Siswa</h3>
        <p>Muhammad Dhava Agsella</p>
        <form>
            <label>Nama:</label>
            <input type="text" name="nama" required>

            <label>Email:</label>
            <input type="email" name="email" required>

            <label>No Telepon:</label>
            <input type="tel" name="telp" required>

            <button type="submit" class="btn-simpan">Simpan</button>
            <button type="reset" class="btn-batal">Batal</button>
        </form>
    </div>

</body>

</html>
