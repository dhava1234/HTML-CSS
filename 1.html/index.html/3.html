<!DOCTYPE html>

<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran Siswa</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #f5f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 420px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
        }

        h2 {
            font-size: 28px;
            margin-bottom: 8px;
            color: #222;
        }

        p {
            font-size: 14px;
            color: #777;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 7px;
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #222;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }

        input:focus {
            border-color: #0d6efd;
        }

        .btn {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
        }

        .btn-primary {
            background: #0d6efd;
            color: white;
        }

        .btn-secondary {
            background: #f1f1f1;
            color: #333;
        }
    </style>

</head>

<body>
    <div class="container">
        <h2>Pendaftaran Siswa</h2>
        <p>Silahkan isi data diri anda</p>
        <form>
            <div class="form-group">
                <label>Nama</label>
                <input type="text" placeholder="Masukkan Nama">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="Contoh: admin@gmail.com">
            </div>
            <div class="form-group">
                <label>No. Telp</label>
                <input type="text" placeholder="089994212290">
            </div>
            <button class="btn btn-primary">Simpan</button>
            <button type="reset" id="btn btn-secondary">Batal</button>

        </form>

    </div>

</body>

</html>
